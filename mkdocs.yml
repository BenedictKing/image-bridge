site_name: ImageBridge
site_description: Shared image generation/editing abstraction
site_url: https://example.invalid/image-bridge
repo_name: image-bridge

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_root_heading: true
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - API Reference:
      - image_bridge: api.md
